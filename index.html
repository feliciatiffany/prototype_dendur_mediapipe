<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracing Dendur</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="canvas"></canvas>
  <div id="webcam-wrap">
    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="hud"></canvas>
  </div>

  <div id="title">Tracing Dendur</div>
  <div id="instructions">
    ← &nbsp;LEFT HAND &nbsp; · &nbsp; scroll<br>
    ↑ &nbsp;RIGHT INDEX &nbsp;· &nbsp; trace
  </div>
  <div id="status">initializing</div>
  <div id="mode-badge">mouse mode</div>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script>
  (function () {
    // ─── DOM ────────────────────────────────────────────────────────────────
    const canvas    = document.getElementById('canvas');
    const ctx       = canvas.getContext('2d');
    const video     = document.getElementById('webcam');
    const statusEl  = document.getElementById('status');
    const badgeEl   = document.getElementById('mode-badge');

    const hudCanvas = document.getElementById('hud');
    const hudCtx    = hudCanvas.getContext('2d');
    hudCanvas.width  = 320;
    hudCanvas.height = 240;

    const HAND_CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [0,9],[9,10],[10,11],[11,12],
      [0,13],[13,14],[14,15],[15,16],
      [0,17],[17,18],[18,19],[19,20],
      [5,9],[9,13],[13,17]
    ];

    // ─── State ───────────────────────────────────────────────────────────────
    let W = 0, H = 0;

    // Offscreen canvases – created once per resize
    let tempCanvas, tempCtx, maskCanvas, maskCtx;

    // Carving
    const carvingImg = new Image();
    let imgLoaded = false;
    let tileW = 0;     // display width of one tile
    let numTiles = 1;  // enough tiles to fill 3× screen width

    // Scroll
    let scrollOffset = 0;
    let targetScroll = 0;

    // Flashlight trail  [{x, y, time}]
    const TRAIL_MS   = 2200;   // fade duration
    const FLASH_R    = 115;    // flashlight radius
    let trail = [];

    // Hand positions (screen coords, mirrored)
    let rightIndexPos = null;
    let leftIndexPos  = null;

    // Mouse fallback (active when no hand detected for >1s)
    let lastHandTime  = 0;
    let mousePos      = null;
    let mouseMode     = false;
    let mouseDragging = false;

    // ─── Resize ──────────────────────────────────────────────────────────────
    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;

      tempCanvas = document.createElement('canvas');
      tempCanvas.width = W; tempCanvas.height = H;
      tempCtx = tempCanvas.getContext('2d');

      maskCanvas = document.createElement('canvas');
      maskCanvas.width = W; maskCanvas.height = H;
      maskCtx = maskCanvas.getContext('2d');

      if (imgLoaded) recalcTiles();
    }

    function recalcTiles() {
      const scale = H / carvingImg.naturalHeight;
      tileW    = carvingImg.naturalWidth * scale;
      numTiles = Math.ceil((W * 3) / tileW) + 1; // ~3× screen width of content
    }

    carvingImg.onload = () => {
      imgLoaded = true;
      recalcTiles();
      statusEl.textContent = 'waiting for camera';
    };
    carvingImg.onerror = () => {
      statusEl.textContent = 'image load failed';
    };
    carvingImg.src = 'carving.png';

    window.addEventListener('resize', resize);
    resize();

    // ─── Helpers ─────────────────────────────────────────────────────────────
    function totalWidth()  { return tileW * numTiles; }
    function maxScroll()   { return Math.max(0, totalWidth() - W); }

    function drawTiled(targetCtx, xOffset) {
      for (let i = 0; i < numTiles; i++) {
        targetCtx.drawImage(carvingImg, i * tileW - xOffset, 0, tileW, H);
      }
    }

    // ─── Render ──────────────────────────────────────────────────────────────
    function render() {
      requestAnimationFrame(render);

      // Slow, heavy scroll with low lerp factor for inertia feel
      scrollOffset += (targetScroll - scrollOffset) * 0.025;
      scrollOffset = Math.max(0, Math.min(maxScroll(), scrollOffset));
      targetScroll  = Math.max(0, Math.min(maxScroll(), targetScroll));

      // Clear
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      if (!imgLoaded) {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.font = '10px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('LOADING', W / 2, H / 2);
        return;
      }

      // Base carving – dim, like carvings in low light
      ctx.save();
      ctx.globalAlpha = 0.15;
      drawTiled(ctx, scrollOffset);
      ctx.restore();

      // Prune expired trail
      const now = Date.now();
      trail = trail.filter(p => now - p.time < TRAIL_MS);

      // Mouse mode fallback
      mouseMode = (now - lastHandTime > 1200) && !rightIndexPos;
      badgeEl.style.display = mouseMode ? 'block' : 'none';

      // Determine active flashlight position
      const activeTip = rightIndexPos || (mouseMode ? mousePos : null);
      if (activeTip) {
        trail.push({ x: activeTip.x, y: activeTip.y, time: now });
        if (trail.length > 180) trail.shift();
      }

      if (trail.length > 0) renderGlow();

      // Right index dot – glow tracer
      if (activeTip) {
        const { x, y } = activeTip;
        const halo = ctx.createRadialGradient(x, y, 0, x, y, 18);
        halo.addColorStop(0, 'rgba(255,245,210,0.5)');
        halo.addColorStop(1, 'rgba(255,245,210,0)');
        ctx.fillStyle = halo;
        ctx.beginPath(); ctx.arc(x, y, 18, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,248,220,0.95)'; ctx.fill();
      }

      // Left index dot – scroll indicator
      if (leftIndexPos) {
        const { x, y } = leftIndexPos;
        const halo = ctx.createRadialGradient(x, y, 0, x, y, 14);
        halo.addColorStop(0, 'rgba(180,220,255,0.4)');
        halo.addColorStop(1, 'rgba(180,220,255,0)');
        ctx.fillStyle = halo;
        ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(200,230,255,0.9)'; ctx.fill();
      }
    }

    // ─── Glow Trace Effect ───────────────────────────────────────────────────
    // The base carving is already visible. This adds extra bloom on top of
    // the traced area using 'screen' blend so lines brighten and glow.
    function renderGlow() {
      const now = Date.now();

      // ── 1. Build bright glow carving in tempCanvas ──
      tempCtx.clearRect(0, 0, W, H);

      // Bloom layer: blurred and very bright so white lines spill outward
      tempCtx.save();
      tempCtx.filter = 'blur(6px) brightness(8)';
      drawTiled(tempCtx, scrollOffset);
      tempCtx.restore();

      // Sharp bright layer on top for crisp line cores
      tempCtx.save();
      tempCtx.globalCompositeOperation = 'source-over';
      tempCtx.filter = 'brightness(4)';
      tempCtx.globalAlpha = 0.85;
      drawTiled(tempCtx, scrollOffset);
      tempCtx.restore();

      // Warm amber tint over the glow
      tempCtx.save();
      tempCtx.globalCompositeOperation = 'screen';
      tempCtx.fillStyle = 'rgba(200, 140, 40, 0.28)';
      tempCtx.fillRect(0, 0, W, H);
      tempCtx.restore();

      // ── 2. Soft radial mask from trail ──
      maskCtx.clearRect(0, 0, W, H);

      trail.forEach(p => {
        const age   = now - p.time;
        const t     = 1 - age / TRAIL_MS;
        const alpha = t * t;

        const r = FLASH_R;
        const g = maskCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
        g.addColorStop(0,    `rgba(255,255,255,${alpha})`);
        g.addColorStop(0.40, `rgba(255,255,255,${alpha * 0.55})`);
        g.addColorStop(0.72, `rgba(255,255,255,${alpha * 0.10})`);
        g.addColorStop(1,    'rgba(255,255,255,0)');

        maskCtx.fillStyle = g;
        maskCtx.fillRect(p.x - r, p.y - r, r * 2, r * 2);
      });

      // ── 3. Clip glow to traced area ──
      tempCtx.globalCompositeOperation = 'destination-in';
      tempCtx.drawImage(maskCanvas, 0, 0);
      tempCtx.globalCompositeOperation = 'source-over';

      // ── 4. Screen-blend onto main canvas → adds brightness, lines glow ──
      ctx.globalCompositeOperation = 'screen';
      ctx.drawImage(tempCanvas, 0, 0);
      ctx.globalCompositeOperation = 'source-over';
    }

    // ─── HUD: hand skeleton overlay on webcam ────────────────────────────────
    function drawHandOverlay(lm, isTrace) {
      const ow = hudCanvas.width;
      const oh = hudCanvas.height;
      const skelColor = isTrace ? 'rgba(255,235,160,0.65)' : 'rgba(160,210,255,0.65)';
      const tipColor  = isTrace ? 'rgba(255,245,190,1)'    : 'rgba(190,225,255,1)';
      const label     = isTrace ? 'TRACE' : 'SCROLL';

      // Mirror X to match CSS-mirrored video
      const px = lx => (1 - lx) * ow;
      const py = ly => ly * oh;

      // Skeleton connections
      hudCtx.strokeStyle = skelColor;
      hudCtx.lineWidth   = 1.2;
      HAND_CONNECTIONS.forEach(([a, b]) => {
        hudCtx.beginPath();
        hudCtx.moveTo(px(lm[a].x), py(lm[a].y));
        hudCtx.lineTo(px(lm[b].x), py(lm[b].y));
        hudCtx.stroke();
      });

      // All 21 landmark dots; landmark 8 (index tip) is larger
      lm.forEach((p, i) => {
        hudCtx.beginPath();
        hudCtx.arc(px(p.x), py(p.y), i === 8 ? 5 : 2, 0, Math.PI * 2);
        hudCtx.fillStyle = i === 8 ? tipColor : skelColor;
        hudCtx.fill();
      });

      // Animated pulse ring on index fingertip
      const tx = px(lm[8].x);
      const ty = py(lm[8].y);
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 180);
      hudCtx.beginPath();
      hudCtx.arc(tx, ty, 8 + pulse * 5, 0, Math.PI * 2);
      hudCtx.strokeStyle = tipColor;
      hudCtx.lineWidth   = 1;
      hudCtx.stroke();

      // Action label near index tip
      hudCtx.font      = 'bold 10px Courier New';
      hudCtx.fillStyle = tipColor;
      hudCtx.textAlign = 'left';
      const lx = tx + 9 > ow - 40 ? tx - 46 : tx + 9;
      const ly = ty - 9 < 10      ? ty + 16  : ty - 9;
      hudCtx.fillText(label, lx, ly);
    }

    // ─── MediaPipe Hands ─────────────────────────────────────────────────────
    let handsReady = false;

    function initMediaPipe() {
      if (typeof Hands === 'undefined') {
        statusEl.textContent = 'mediapipe unavailable – mouse mode';
        return;
      }

      const hands = new Hands({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
      });

      // Lower thresholds so both hands register reliably simultaneously
      hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.4
      });

      hands.onResults(results => {
        if (!handsReady) { handsReady = true; }

        rightIndexPos = null;
        leftIndexPos  = null;
        const handedness = results.multiHandedness || [];
        const landmarks  = results.multiHandLandmarks || [];

        hudCtx.clearRect(0, 0, hudCanvas.width, hudCanvas.height);

        let detected = [];

        handedness.forEach((info, i) => {
          const lm    = landmarks[i];
          const label = info.label; // "Left" / "Right" from person's POV

          // Mirror X – front-facing camera flips for natural display
          const mx = nx => (1 - nx) * W;
          const my = ny => ny * H;

          if (label === 'Right') {
            // Left hand physically → MediaPipe labels as 'Right' with mirrored camera
            // Index fingertip (lm[8]) X position → scroll target
            const norm = Math.max(0, Math.min(1, (0.9 - lm[8].x) / 0.8));
            targetScroll = norm * maxScroll();
            leftIndexPos = { x: mx(lm[8].x), y: my(lm[8].y) };
            lastHandTime = Date.now();
            detected.push('L-scroll');
            drawHandOverlay(lm, false);

          } else if (label === 'Left') {
            // Right hand physically → MediaPipe labels as 'Left' with mirrored camera
            // Index fingertip = landmark 8 → glow tracer
            rightIndexPos = { x: mx(lm[8].x), y: my(lm[8].y) };
            lastHandTime  = Date.now();
            detected.push('R-trace');
            drawHandOverlay(lm, true);
          }
        });

        statusEl.textContent = detected.length ? detected.join(' + ') : 'no hands';
      });

      return hands;
    }

    // ─── Camera ──────────────────────────────────────────────────────────────
    async function startCamera() {
      const hands = initMediaPipe();

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480, facingMode: 'user' }
        });
        video.srcObject = stream;
        await new Promise(r => { video.onloadedmetadata = r; });

        if (!hands) return;

        if (typeof Camera !== 'undefined') {
          const cam = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640,
            height: 480
          });
          cam.start();
        } else {
          // Fallback: drive MediaPipe from requestAnimationFrame
          const sendLoop = async () => {
            if (video.readyState >= 2) await hands.send({ image: video });
            requestAnimationFrame(sendLoop);
          };
          sendLoop();
        }

        statusEl.textContent = 'camera on';
      } catch (err) {
        statusEl.textContent = 'no camera – mouse mode';
        console.warn('Camera error:', err);
      }
    }

    // ─── Mouse / Keyboard Fallbacks ───────────────────────────────────────────
    // Mouse: hover to simulate flashlight (when no hand detected)
    canvas.addEventListener('mousemove', e => {
      mousePos = { x: e.clientX, y: e.clientY };
    });

    canvas.addEventListener('mouseleave', () => {
      mousePos = null;
    });

    // Left-button drag to scroll (when no left hand detected)
    let dragStartX = null, dragStartScroll = 0;
    canvas.addEventListener('mousedown', e => {
      if (e.button === 0) {
        dragStartX     = e.clientX;
        dragStartScroll = targetScroll;
        mouseDragging  = true;
      }
    });
    window.addEventListener('mousemove', e => {
      if (mouseDragging && dragStartX !== null) {
        const delta = dragStartX - e.clientX;
        targetScroll = dragStartScroll + delta;
      }
    });
    window.addEventListener('mouseup', () => {
      mouseDragging = false; dragStartX = null;
    });

    // Arrow key scroll
    window.addEventListener('keydown', e => {
      const step = 80;
      if (e.key === 'ArrowLeft')  targetScroll -= step;
      if (e.key === 'ArrowRight') targetScroll += step;
    });

    // ─── Boot ─────────────────────────────────────────────────────────────────
    startCamera();
    render();

  })();
  </script>
</body>
</html>
